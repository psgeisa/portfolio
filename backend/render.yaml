services:
  - type: web
    name: portfolio-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && playwright install chromium"
    startCommand: "gunicorn -w 2 -b 0.0.0.0:$PORT app:app"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_TOKEN_SECRET
        sync: false
      - key: ADMIN_COOKIE_SECURE
        value: "true"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AI_PROVIDER
        sync: false
      - key: GEMINI_MODEL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
